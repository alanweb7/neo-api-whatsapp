version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: wa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wa_saas
      POSTGRES_USER: wa_user
      POSTGRES_PASSWORD: wa_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wa_user -d wa_saas"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wa-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  whatsapp-engine:
    build:
      context: ./whatsapp-engine
      dockerfile: Dockerfile
    container_name: whatsapp-engine
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      ENGINE_PORT: 8090
    ports:
      - "8090:8090"
    volumes:
      - wa_sessions:/app/data/sessions
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8090/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5

  api-core-go:
    build:
      context: ./core-go
      dockerfile: Dockerfile
    container_name: api-core-go
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      HTTP_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      whatsapp-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  wa_sessions:
