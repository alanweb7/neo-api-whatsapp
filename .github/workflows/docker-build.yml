name: Docker Build & Push

on:
  push:
    branches: [main, develop]
    paths:
      - 'core-go/**'
      - 'whatsapp-engine/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'core-go/**'
      - 'whatsapp-engine/**'
      - 'docker-compose.yml'

env:
  REGISTRY: ghcr.io
  GITHUB_USER: alanweb7

jobs:
  build-core:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.GITHUB_USER }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Core API
        uses: docker/build-push-action@v5
        with:
          context: ./core-go
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.GITHUB_USER }}/baileys-core:latest
            ${{ env.REGISTRY }}/${{ env.GITHUB_USER }}/baileys-core:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.GITHUB_USER }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push WhatsApp Engine
        uses: docker/build-push-action@v5
        with:
          context: ./whatsapp-engine
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.GITHUB_USER }}/baileys-engine:latest
            ${{ env.REGISTRY }}/${{ env.GITHUB_USER }}/baileys-engine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-core, build-engine]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cp .env.example .env 2>/dev/null || cat > .env << 'EOF'
          NODE_ENV=production
          POSTGRES_DB=wa_saas
          POSTGRES_USER=wa_user
          POSTGRES_PASSWORD=wa_pass
          REDIS_URL=redis://redis:6379
          ENGINE_PORT=8090
          HTTP_PORT=8080
          INTERNAL_API_KEY=test-api-key-12345
          WA_EVENTS_CHANNEL=wa.events.v1
          SESSION_STORE_PATH=/app/data/sessions
          EOF

      - name: Validate docker-compose.yml
        run: docker compose config > /dev/null && echo "✓ docker-compose.yml is valid"

      - name: Build services locally
        run: docker compose build --no-cache

      - name: Test service startup
        run: |
          docker compose up -d
          sleep 30

          # Check healthchecks and logs
          docker compose ps
          echo "=== Core API logs ==="
          docker compose logs api-core-go | head -50
          echo "=== Engine logs ==="
          docker compose logs whatsapp-engine | head -50

          # Wait for healthchecks
          for i in {1..20}; do
            if curl -f http://localhost:8080/healthz 2>/dev/null; then
              echo "✓ Core API is healthy"
              break
            fi
            echo "Waiting for Core API... ($i/20)"
            sleep 3
          done

          for i in {1..20}; do
            if curl -f http://localhost:8090/healthz 2>/dev/null; then
              echo "✓ Engine is healthy"
              break
            fi
            echo "Waiting for Engine... ($i/20)"
            sleep 3
          done

      - name: Cleanup
        if: always()
        run: docker compose down -v
