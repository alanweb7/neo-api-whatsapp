name: Docker Build & Validate

on:
  push:
    branches: [main, develop]
    paths:
      - 'core-go/**'
      - 'whatsapp-engine/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'core-go/**'
      - 'whatsapp-engine/**'
      - 'docker-compose.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        run: cp .env.example .env || echo "No .env.example found, creating minimal .env"
        continue-on-error: true

      - name: Generate minimal .env if not exists
        if: failure()
        run: |
          cat > .env << 'EOF'
          POSTGRES_DB=wa_saas
          POSTGRES_USER=wa_user
          POSTGRES_PASSWORD=wa_pass
          REDIS_URL=redis://redis:6379
          ENGINE_PORT=8090
          HTTP_PORT=8080
          EOF

      - name: Build Core API (Go)
        uses: docker/build-push-action@v5
        with:
          context: ./core-go
          push: false
          tags: baileys-api:core-go-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build WhatsApp Engine (Node)
        uses: docker/build-push-action@v5
        with:
          context: ./whatsapp-engine
          push: false
          tags: baileys-api:engine-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate docker-compose.yml
        run: |
          docker compose config > /dev/null && echo "✓ docker-compose.yml is valid"

      - name: Build with docker compose
        run: |
          docker compose build --no-cache

      - name: Test service startup
        run: |
          docker compose up -d
          sleep 10

          # Check healthchecks
          docker compose ps

          # Verify Core API
          curl -f http://localhost:8080/healthz || exit 1
          echo "✓ Core API is healthy"

          # Verify Engine
          curl -f http://localhost:8090/healthz || exit 1
          echo "✓ Engine is healthy"

      - name: Cleanup
        if: always()
        run: docker compose down -v

  lint-dockerfiles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3
        with:
          dockerfiles: |
            core-go/Dockerfile
            whatsapp-engine/Dockerfile
          ignore: DL3008,DL3009
