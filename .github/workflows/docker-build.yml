name: Docker Build & Push

on:
  push:
    branches: [main, develop]
    paths:
      - 'core-go/**'
      - 'whatsapp-engine/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-build.yml'

env:
  REGISTRY: ghcr.io
  GITHUB_USER: alanweb7

jobs:
  build-core:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.GITHUB_USER }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Core API
        uses: docker/build-push-action@v5
        with:
          context: ./core-go
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GITHUB_USER }}/baileys-core:latest
            ${{ env.REGISTRY }}/${{ env.GITHUB_USER }}/baileys-core:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.GITHUB_USER }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push WhatsApp Engine
        uses: docker/build-push-action@v5
        with:
          context: ./whatsapp-engine
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GITHUB_USER }}/baileys-engine:latest
            ${{ env.REGISTRY }}/${{ env.GITHUB_USER }}/baileys-engine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
