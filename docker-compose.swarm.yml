version: "3.7"

services:

## --------------------------- BAILEYS API ALAN --------------------------- ##

  postgres:
    image: postgres:16
    command: postgres -c shared_buffers=256MB -c max_connections=200
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - traefik_public
    environment:
      POSTGRES_DB: wa_saas
      POSTGRES_USER: wa_user
      POSTGRES_PASSWORD: wa_pass
      POSTGRES_INITDB_ARGS: -c max_connections=200
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wa_user -d wa_saas"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - traefik_public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  whatsapp-engine:
    image: ghcr.io/alanweb7/baileys-engine:latest
    environment:
      NODE_ENV: production
      ENGINE_PORT: 8090
      REDIS_URL: redis://redis:6379
      INTERNAL_API_KEY: changeme123456789012345
      WA_EVENTS_CHANNEL: wa.events.v1
      SESSION_STORE_PATH: /app/data/sessions
    volumes:
      - wa_sessions:/app/data/sessions
    networks:
      - traefik_public
    depends_on:
      - redis
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      labels:
        - traefik.enable=true
        - traefik.http.routers.engine.rule=Host(`engine.zap-api.wesenderbrasil.com.br`)
        - traefik.http.routers.engine.entrypoints=websecure
        - traefik.http.routers.engine.tls.certresolver=letsencryptresolver
        - traefik.http.services.engine.loadbalancer.server.port=8090
        - traefik.http.services.engine.loadbalancer.passHostHeader=true
        - traefik.http.routers.engine.service=engine
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8090/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  api-core-go:
    image: ghcr.io/alanweb7/baileys-core:latest
    environment:
      APP_ENV: production
      HTTP_PORT: 8080
      APP_NAME: baileys-saas-core
      DATABASE_URL: postgres://wa_user:wa_pass@postgres:5432/wa_saas?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      JWT_ACCESS_SECRET: changeme123456789012345
      JWT_REFRESH_SECRET: changeme123456789012345
      JWT_ACCESS_TTL_MIN: "30"
      JWT_REFRESH_TTL_DAYS: "30"
      ENGINE_BASE_URL: http://whatsapp-engine:8090
      INTERNAL_API_KEY: changeme123456789012345
    networks:
      - traefik_public
    depends_on:
      - postgres
      - redis
      - whatsapp-engine
    deploy:
      mode: replicated
      replicas: 2
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s
      labels:
        - traefik.enable=true
        ## API REST
        - traefik.http.routers.api.rule=Host(`zap-api.wesenderbrasil.com.br`) || Host(`api.zap-api.wesenderbrasil.com.br`)
        - traefik.http.routers.api.entrypoints=websecure
        - traefik.http.routers.api.tls.certresolver=letsencryptresolver
        - traefik.http.routers.api.middlewares=api-strip-prefix
        - traefik.http.services.api.loadbalancer.server.port=8080
        - traefik.http.services.api.loadbalancer.passHostHeader=true
        - traefik.http.routers.api.service=api
        - traefik.http.middlewares.api-strip-prefix.stripprefix.prefixes=/api
        - traefik.http.middlewares.api-strip-prefix.stripprefix.forceslash=true
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

## --------------------------- BAILEYS API ALAN --------------------------- ##

volumes:
  postgres_data:
    external: true
    name: baileys_postgres_data
  redis_data:
    external: true
    name: baileys_redis_data
  wa_sessions:
    external: true
    name: baileys_wa_sessions

networks:
  traefik_public:
    external: true
    name: traefik_public
