openapi: 3.0.3
info:
  title: Baileys SaaS Core API
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Healthcheck
      responses:
        '200':
          description: ok
  /api/v1/auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, tenant_id]
              properties:
                email: { type: string }
                password: { type: string }
                tenant_id: { type: string, format: uuid }
      responses:
        '200':
          description: Authenticated
  /api/v1/sessions:
    post:
      summary: Create WhatsApp session
      security:
        - bearerAuth: []
      responses:
        '201':
          description: created
    get:
      summary: List sessions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: list
  /api/v1/messages/text:
    post:
      summary: Send text message
      security:
        - bearerAuth: []
      responses:
        '200':
          description: sent
  /api/v1/messages/buttons:
    post:
      summary: Send interactive buttons message
      security:
        - bearerAuth: []
      responses:
        '200':
          description: sent
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
